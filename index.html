 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار مادة الرياضيات</title>
    <!-- ربط ملف التنسيق الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <!-- 📥 أولاً: واجهة الترحيب وإدخال بيانات الطالب -->
        <div id="welcomeScreen" class="quiz-welcome-container">
            <div class="welcome-text">
                <h1>أهلاً بك في اختبار مادة الرياضيات 📐✨</h1>
                <p>عزيزي الطالب، يرجى ملء بياناتك بدقة قبل البدء، ثم اقرأ الأسئلة بعناية قبل اختيار الإجابة. تمنياتنا لك بالتوفيق!</p>
            </div>

            <!-- حقول إدخال البيانات -->
            <div class="input-group">
                <label for="studentName">اسم الطالب رباعي:</label>
                <input type="text" id="studentName" placeholder="أدخل اسمك هنا..." required>
                
                <label for="seatNumber">رقم الجلوس:</label>
                <input type="number" id="seatNumber" placeholder="أدخل رقم جلوسك..." required>
            </div>

            <!-- حاوية زر البدء المتموضعة في أقصى اليمين -->
            <div class="button-wrapper">
                <button class="start-btn" id="startQuizBtn">بدء الاختبار 🚀</button>
            </div>
        </div>

        <!-- 📝 ثانياً: حاوية الأسئلة (تكون مخفية وتظهر بالمنتصف عند البدء) -->
        <div id="quizScreen" class="quiz-questions-container hidden">
            <div class="question-box">
                <h2 id="questionText">جاري تحميل السؤال الأول...</h2>
                <div class="options-wrapper" id="optionsWrapper">
                    <!-- الأزرار ستتولد هنا عبر الجافا سكريبت في المنتصف تماماً -->
                </div>
            </div>
        </div>
    </div>

    <!-- ربط ملف البرمجة الخارجي -->
<script src="script.js"></script>

</body>
</html>
